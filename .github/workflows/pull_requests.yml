name: PRs checks

on:
  pull_request:
    branches:
      - main

jobs:
  setup-image:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - name: Build setup image
        run: make build
      - name: Build UBI based setup image
        run: make build \
          DOCKERFILE=Dockerfile-ubi \
          TAG_SUFFIX=-ubi
